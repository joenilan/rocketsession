<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rocket Session Stats</title>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const isTauri = "__TAURI_INTERNALS__" in window;
        if (!isTauri || params.get("overlay") === "1") {
          document.documentElement.classList.add("overlay-runtime");
        }
      })();
    </script>
    <style>
      html {
        height: 100%;
      }
      body, #root {
        height: 100%;
        margin: 0;
        background: #09090b;
        color: #fafafa;
      }
      html.overlay-runtime,
      html.overlay-runtime body,
      html.overlay-runtime #root {
        background: transparent !important;
      }
      html.overlay-runtime #boot-splash {
        display: none;
      }
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        font-family: ui-monospace, "JetBrains Mono", monospace;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.5);
        background: #09090b;
        background-image:
          radial-gradient(ellipse at 20% 0%, rgba(124, 58, 237, 0.12) 0%, transparent 50%),
          radial-gradient(ellipse at 80% 100%, rgba(99, 102, 241, 0.08) 0%, transparent 50%);
        opacity: 1;
        transition: opacity 180ms ease;
        pointer-events: none;
      }
      #boot-splash.boot-splash-hide {
        opacity: 0;
      }
      .boot-spinner {
        width: 16px;
        height: 16px;
        border-radius: 999px;
        border: 2px solid rgba(255, 255, 255, 0.15);
        border-top-color: #7c3aed;
        animation: boot-spin 0.9s linear infinite;
      }
      @keyframes boot-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot-splash" role="status" aria-live="polite">
      <div class="boot-spinner"></div>
      Rocket Session Stats
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
